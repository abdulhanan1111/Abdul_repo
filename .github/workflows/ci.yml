name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - working-directory: frontend
        run: npm ci

      - working-directory: frontend
        run: npm run lint || echo "No lint"

      - working-directory: frontend
        run: npm test || echo "No tests"

      - working-directory: frontend
        run: npm run build

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - working-directory: backend
        run: |
          pip install flake8 pytest
          flake8 . || echo "lint warning"
          pytest || echo "no tests"

      - working-directory: backend
        run: python -m compileall .

  deploy:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/ubuntu/Logistics_Project_Transfer"
            REPO_URL="https://github.com/abdulhanan1111/Abdul_repo.git"

            echo "Pulling code..."
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              git clone "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi

            echo "Setting up backend..."
            if [ -f backend/requirements.txt ]; then
              if [ ! -d backend/venv ]; then
                python3 -m venv backend/venv
              fi

              source backend/venv/bin/activate
              pip install -r backend/requirements.txt

              if [ -f backend/alembic.ini ]; then
                cd backend
                alembic upgrade head
                cd ..
              fi

              sudo systemctl restart logistics-backend
            fi

            echo "Setting up frontend..."
            if [ -f frontend/package.json ]; then
              cd frontend
              npm ci
              npm run build

              sudo npm install -g serve

              if [ ! -f /etc/systemd/system/logistics-frontend.service ]; then
cat <<EOF | sudo tee /etc/systemd/system/logistics-frontend.service
[Unit]
Description=Logistics Frontend
After=network.target

[Service]
User=ubuntu
WorkingDirectory=/home/ubuntu/Logistics_Project_Transfer/frontend
ExecStart=/usr/bin/serve -s dist -l 5173
Restart=always

[Install]
WantedBy=multi-user.target
EOF
                sudo systemctl daemon-reload
                sudo systemctl enable logistics-frontend
              fi

              sudo systemctl restart logistics-frontend
              cd ..
            fi

            echo "Health check..."
            sleep 5
            curl -f http://localhost:8000/health || exit 1

            echo "Deploy successful"
