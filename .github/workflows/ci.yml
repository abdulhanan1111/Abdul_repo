name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  deploy:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Pull Latest on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/home/ubuntu/Logistics_Project_Transfer"
            REPO_URL="https://github.com/abdulhanan1111/Abdul_repo.git"
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              mkdir -p "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi

            if [ -f "$APP_DIR/backend/requirements.txt" ]; then
              if [ ! -d "$APP_DIR/backend/venv" ]; then
                python3 -m venv "$APP_DIR/backend/venv"
              fi
              "$APP_DIR/backend/venv/bin/pip" install -r "$APP_DIR/backend/requirements.txt"
              sudo systemctl restart logistics-backend
            fi

            if [ -f "$APP_DIR/frontend/package.json" ]; then
              if [ ! -f "/etc/systemd/system/logistics-frontend.service" ]; then
                sudo tee /etc/systemd/system/logistics-frontend.service > /dev/null << 'EOF'
[Unit]
Description=Logistics Frontend (Vite Dev Server)
After=network.target

[Service]
User=ubuntu
WorkingDirectory=/home/ubuntu/Logistics_Project_Transfer/frontend
ExecStart=/usr/bin/npm run dev -- --host 0.0.0.0 --port 5173
Restart=always
RestartSec=3
Environment=NODE_ENV=development

[Install]
WantedBy=multi-user.target
EOF
                sudo systemctl daemon-reload
                sudo systemctl enable logistics-frontend
              fi

              cd "$APP_DIR/frontend"
              npm ci
              sudo systemctl restart logistics-frontend
            fi

# sync
